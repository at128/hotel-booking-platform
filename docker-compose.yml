services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hotelbooking-sql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: [
        "CMD-SHELL",
        "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -C -Q 'SELECT 1' || exit 1"
      ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hotelbooking-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: hotelbooking-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [
        "CMD-SHELL",
        "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"
      ]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - hotelbooking-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    container_name: hotelbooking-kibana
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      ELASTICSEARCH_USERNAME: "elastic"
      ELASTICSEARCH_PASSWORD: "${ELASTIC_PASSWORD}"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - hotelbooking-net

  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: hotelbooking-embedding
    ports:
      - "8000:8000"
    networks:
      - hotelbooking-net

  api:
    build:
      context: .
      dockerfile: src/HotelBooking.Api/Dockerfile
    container_name: hotelbooking-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=HotelBookingDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      Elasticsearch__Url: "http://elasticsearch:9200"
      Elasticsearch__Username: "elastic"
      Elasticsearch__Password: "${ELASTIC_PASSWORD}"
      Elasticsearch__HotelIndexName: "hotels"
      Elasticsearch__AllowInvalidCertificates: "true"
      Elasticsearch__EnableSemanticSearch: "true"
      Embedding__BaseUrl: "http://embedding-service:8000"
      Embedding__EmbeddingsEndpoint: "/embeddings"
      Embedding__Model: "all-MiniLM-L6-v2"
      Embedding__Dimensions: "384"
      Embedding__TimeoutSeconds: "30"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      embedding-service:
        condition: service_started
    networks:
      - hotelbooking-net

volumes:
  sql_data:
  es_data:

networks:
  hotelbooking-net:
    driver: bridge